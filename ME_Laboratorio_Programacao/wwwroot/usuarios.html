<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Cadastro Usuários</title>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="brand">🤖 ME_LAB</div>
            <nav id="nav">
                <a onclick="navegarPara('dashboard')" data-page="dashboard" >📊 Dashboard</a>
                <a onclick="navegarPara('chat')" data-page="chat">💬 Chat / Memória</a>
                <a onclick="navegarPara('agentes')" data-page="agentes">🤖 Agentes</a>
                <a onclick="navegarPara('categorias')" data-page="categorias">🏷️ Categorias</a>
                <a onclick="navegarPara('canais')" data-page="canais">🌐 Canais</a>
                <a onclick="navegarPara('usuarios')" data-page="usuarios" class="active">👤 Usuários</a>
            </nav>
            <div class="user-info">
            <strong>Administrador</strong>
            Admin
            <br><br>
            <a href="#" onclick="logout()" style="color:var(--danger);font-size:.8rem">Sair</a>
            </div>
        </aside>
        <main id="main">
            <div id="page-content" class="container">
                <div id="topbar">
                    <h1>Bem-vindo, <span id="user-logged">...</span>!</h1>
                    <button id="btn-logout" class="btn-danger">Sair do Sistema</button>
                </div>

                <div>
                    <section class="card Form-section">
                        <h3>Cadastrar Novo Usuário</h3>
                        <form id="user-form">
                            <div class="form-inline">
                                <input type="text" id="user-nome" placeholder="Nome Completo" required>
                                <input type="email" id="user-email" placeholder="E-mail" required>
                                <input type="password" id="user-senha" placeholder="Senha" required>
                                <select id="user-perfil" required>
                                    <option value="">Selecione o Perfil</option>
                                    <option value="1">Admin</option>
                                    <option value="2">Operador</option>
                                    <option value="3">Visualizador</option>
                                </select>
                                <button type="submit" class="btn-success">Adicionar</button>
                            </div>
                        </form>
                    </section>

                    <section class="card table-section">
                        <h3>Usuários Cadastrados</h3>
                        <table id="users-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>E-mail</th>
                                    <th>Perfil</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </section>
                </div>
            </div>
        </main>
    </div>
    

    <script src="scripts/usuarios.js"></script>
</body>
</html>
