<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/style.css">
  <title>Cadastro Usuários</title>
</head>

<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">🤖 ME_LAB</div>
      <nav id="nav">
        <a onclick="navegarPara('dashboard')" data-page="dashboard">📊 Dashboard</a>
        <a onclick="navegarPara('chat')" data-page="chat">💬 Chat / Memória</a>
        <a onclick="navegarPara('agentes')" data-page="agentes">🤖 Agentes</a>
        <a onclick="navegarPara('categoriaAgente')" data-page="categorias" class="active">🏷️ Categorias</a>
        <a onclick="navegarPara('canais')" data-page="canais">🌐 Canais</a>
        <a onclick="navegarPara('usuarios')" data-page="usuarios">👤 Usuários</a>
      </nav>
      <div class="user-info">
        <strong>Administrador</strong>
        Admin
        <br><br>
        <a href="#" onclick="logout()" style="color:var(--danger);font-size:.8rem">Sair</a>
      </div>
    </aside>
    <main id="main">
      <div id="page-content" class="container">

        <div id="topbar">
          <h2>Bem-vindo, <span id="user-logged">...</span>!</h2>
          <button id="btn-logout" class="btn btn-danger">Sair do Sistema</button>
        </div>


        <div>
          <section class="card table-section">
            <div class="titulo-table">
              <h2>Categorias de Agente</h2>
              <button class="btn btn-primary" onclick="modalCategoria()">+ Nova Categoria</button>
            </div>
            <table id="category-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nome</th>
                  <th>Cor Hexadecimal</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
              </tbody>
            </table>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="scripts/app.js"></script>
  <script src="scripts/categoriaAgente.js" type="module"></script>
</body>

</html>
